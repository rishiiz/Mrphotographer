version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mrphotographer_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mrphotographer
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: mrphotographer_backend
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=mrphotographer
      - PORT=5000
      - JWT_SECRET=mrphotographer_secret_key_change_in_production
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: mrphotographer_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
